site_name: Dokumentenmanager 2026
site_description: Projektdokumentation (Web) - Dokumentenmanager 2026
site_author: Projektteam Dokumentenmanager (RDF)
site_url: https://chfchris.github.io/Dokumentation-zur-Projektarbeit/

repo_url: https://github.com/CHFChris/Dokumentation-zur-Projektarbeit
repo_name: CHFChris/Dokumentation-zur-Projektarbeit
edit_uri: edit/main/docs/

theme:
  name: material
  language: de
  logo: assets/logo.svg
  favicon: assets/logo.svg
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - content.code.copy
    - content.action.edit
    - search.highlight
    - search.share
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Dunkelmodus
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Hellmodus

nav:
  - Home: index.md
  - Installation & Quick Start: installation-quickstart.md
  - Technische Dokumentation:
      - Architektur: developer/architecture.md
      - Datenbankmodell: developer/database.md
      - API-Referenz: developer/api.md
      - Projektstruktur: developer/file-structure.md
  - Nutzungshandbuch:
      - Überblick: user-guide/overview.md
      - Use-Cases: user-guide/use-cases.md
      - UI & Screenshots: user-guide/ui-screenshots.md
      - UI-Mockups (optional): user-guide/ui-mockups.md
      - Beispiel-Daten: user-guide/example-data.md
  - Technische Strategie: technical-strategy.md
  - Format & Abgabe: format-deliverables.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid

extra_javascript:
  - javascripts/mermaid.js

extra_css:
  - stylesheets/extra.css

extra:
  generator: false
