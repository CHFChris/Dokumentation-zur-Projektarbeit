site_name: Dokumentenmanager
site_description: Projektdokumentation zum Dokumentenmanager – sichere, strukturierte Dokumentenverwaltung
site_author: Christian Schweitzer, Cristian Radici, Raphael Hirschmann
site_url: https://chfchris.github.io/Dokumentation-zur-Projektarbeit/

repo_url: https://github.com/CHFChris/Dokumentation-zur-Projektarbeit
repo_name: CHFChris/Dokumentation-zur-Projektarbeit
edit_uri: edit/main/docs/

theme:
  name: material
  language: de
  logo: assets/images/logo.jpg
  favicon: assets/images/logo.jpg
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.action.edit
    - search.highlight
    - search.share
    - toc.follow
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: black
      accent: amber
      toggle:
        icon: material/weather-night
        name: Dunkelmodus aktivieren
    - scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Hellmodus aktivieren

nav:
  - Home: index.md
  - Installation & Quickstart: installation.md
  - Technische Dokumentation:
      - Architektur: developer/architecture.md
      - Datenbankmodell: developer/database.md
      - API-Referenz: developer/api.md
      - Projektstruktur: developer/file-structure.md
      - Sicherheitskonzept: developer/security.md
  - Nutzungshandbuch:
      - Überblick & Use-Cases: user-guide/overview.md
      - UI-Screenshots: user-guide/screenshots.md
      - Beispieldaten & Demo: user-guide/example-data.md
  - Technische Strategie: strategy.md
  - Betrieb & Deployment: operations.md
  - Projektinfo: project-info.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

extra:
  generator: false
